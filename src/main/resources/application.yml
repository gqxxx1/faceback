# 服务器配置
server:
  port: 9090

# 数据库配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3406/face_attendance?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      # 初始化连接数
      initial-size: 5
      # 最大活跃连接数
      max-active: 20
      # 最小空闲连接数
      min-idle: 5
      # 获取连接超时时间(ms)
      max-wait: 60000
      # 连接有效性检测
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis配置 (可选)
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000

  # Security配置
  security:
    user:
      name: admin
      password: admin

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sdjzu.faceattendancesystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # logic-delete-field: deleted  # 注释掉，改为物理删除
      # logic-delete-value: 1
      # logic-not-delete-value: 0

# JWT配置
jwt:
  secret: FaceAttendanceSystemSecretKey2024sdjzumining
  expiration: 86400000  # 24小时

# 考勤规则默认值
attendance:
  default-work-start-time: "08:00"
  default-work-end-time: "18:00"
  default-late-threshold: 10
  default-early-leave-threshold: 10
  default-overtime-threshold: 10
  default-continuous-work-threshold: 7
